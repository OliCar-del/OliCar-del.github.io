# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely edit after that. If you find
# yourself editing this file very often, consider using Jekyll's data files
# feature for the data you need to update frequently.

# Main Page Setup

title: Oliver Carnew's Project Portfolio # This is what shows up in the tab of the browser



# Hero Section
name: Oliver Carnew
headline: Graduate Electrical Engineer
description: >- # dont remove this line. this will ignore all new lines until the next section
  Hands-on electrical engineering graduate (University of Queensland, 2025) who designs, builds and tests real hardware -
  power electronics and battery systems, instrumentation and data acquisition, embedded firmware and control systems.
  Projects are taken from concept to verified result: schematic capture, PCB layout, firmware, bench bring-up and
  fault-finding, with measured performance reported honestly.

# Place your profile image in /assets/images/profile-image/folder and edit the file name
profile_image: ./assets/images/profile-image/cropped_headshot.png


# Link your resume
# You can place your resume in assets/resume/{resume.pdf or add external link such as pdf saved in google drive 
resume-url: /assets/resume/Oliver_Carnew_CV_07_26.pdf # or /assets/resume/resume.pdf


# Set up external links - this will show up as small icons next to your name.

external-links:    # input only your own url slug. The icons with missing entries will not appear.
  linkedin: oliver-carnew    # https://www.linkedin.com/in/oliver-carnew/
  github: OliCar-del?tab=repositories    # https://github.com/OliCar-del 
  stackoverflow:      # https://stackoverflow.com/users/{your url slug}
  medium:            # https://medium.com/@{your url slug} 
  x-twitter:   # https://x.com/{your url slug} 
  threads:            # https://threads.net/@{your url slug} 
  instragram:       # https://instagram.com/{your url slug} 
  youtube:           # https://youtube.com/@{your url slug} 
  discord:            # https://discord.com/users/{your url slug} 
  bluesky:           # https://bsky.app/profile/{your url slug} 
  

# Skills Section - Add the list of your Skills by categories/tools. The indentation for each level needs to be precise.
skills:
  - category: Power & Analog Electronics
    tools:
    - Battery systems (LiFePO4 pack construction, BMS integration, protection & fusing)
    - Solar MPPT, DC-DC conversion and USB-C/USB-PD power-path design
    - Analog front ends - signal conditioning, precision current sources, input protection
    - Circuit simulation & verification (LTspice)

  - category: PCB Design & Hardware Bring-up
    tools:
    - Schematic capture & PCB layout (Altium Designer, KiCad)
    - Iterative prototyping - breadboard to revision-driven PCB spins, design-for-debug
    - Bench test & fault-finding (oscilloscope, logic analyser, multimeter)
    - SMT & through-hole assembly, soldering and rework
    - BOM management & cost engineering

  - category: Embedded Systems & Instrumentation
    tools:
    - Microcontroller firmware in C/C++ (STM32, FreeRTOS)
    - Data acquisition - ADCs, sensor integration, alarms and logging
    - Serial protocols (UART, SPI, I2C) and custom optical links
    - Real-time firmware - interrupts, timers, state machines

  - category: Control Systems
    tools:
    - PID design - anti-windup, feedforward, derivative filtering
    - Frequency-domain analysis (Bode margins, root locus, Routh-Hurwitz)
    - Dead-time compensation (Smith predictor) and relay autotuning
    - MATLAB/Simulink and real-time simulation in C

  - category: Software, Data & Machine Learning
    tools:
    - Python (NumPy, pandas, pipeline automation)
    - Large-dataset processing, statistical analysis and visualisation
    - NLP & neural ranking model evaluation (LLMs, TensorFlow)
    - SQL, JavaScript
    - Git (version control)

  - category: Engineering Practice
    tools:
    - Technical documentation & reporting
    - Verification culture - test harnesses, regression self-tests, quality assurance
    - Scrum/Agile
    - WHS and electrical safety awareness


